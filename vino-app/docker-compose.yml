version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vinodb
      POSTGRES_USER: vino
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vinopass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: ./backend/.env.production
    depends_on:
      - db
      - redis
    restart: unless-stopped

volumes:
  postgres_data:
