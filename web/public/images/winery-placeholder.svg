<svg width="400" height="240" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#E8D5B7"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B8F4E"/>
      <stop offset="100%" stop-color="#4A6B32"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="400" height="240" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="340" cy="50" r="28" fill="#F5C842" opacity="0.8"/>
  <!-- Hills -->
  <ellipse cx="100" cy="200" rx="160" ry="60" fill="#5A7A3A" opacity="0.6"/>
  <ellipse cx="320" cy="210" rx="140" ry="50" fill="#4A6B32" opacity="0.5"/>
  <!-- Ground -->
  <rect x="0" y="170" width="400" height="70" fill="url(#ground)"/>
  <!-- Vineyard rows -->
  <line x1="20" y1="240" x2="60" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <line x1="70" y1="240" x2="110" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <line x1="120" y1="240" x2="160" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <line x1="170" y1="240" x2="210" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <line x1="220" y1="240" x2="260" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <line x1="270" y1="240" x2="310" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <line x1="320" y1="240" x2="360" y2="175" stroke="#3A5220" stroke-width="2" opacity="0.7"/>
  <!-- Winery building -->
  <rect x="155" y="105" width="90" height="68" fill="#D4B896"/>
  <polygon points="140,105 200,72 260,105" fill="#A0522D"/>
  <!-- Windows -->
  <rect x="168" y="120" width="18" height="22" rx="2" fill="#7B9EA6" opacity="0.8"/>
  <rect x="214" y="120" width="18" height="22" rx="2" fill="#7B9EA6" opacity="0.8"/>
  <!-- Door -->
  <rect x="191" y="140" width="18" height="33" rx="2" fill="#8B6914"/>
  <!-- Chimney -->
  <rect x="218" y="85" width="10" height="22" fill="#A0522D"/>
  <!-- Trees -->
  <circle cx="120" cy="138" r="22" fill="#3A6B2A"/>
  <rect x="117" y="155" width="6" height="18" fill="#5C3D1E"/>
  <circle cx="280" cy="135" r="20" fill="#3A6B2A"/>
  <rect x="277" y="150" width="6" height="23" fill="#5C3D1E"/>
</svg>
