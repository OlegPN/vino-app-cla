<svg width="200" height="480" viewBox="0 0 200 480" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Bottle glass gradient: clear/very light pink glass for rosé -->
    <linearGradient id="bottleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7a3540"/>
      <stop offset="12%" stop-color="#c06075"/>
      <stop offset="28%" stop-color="#d4788a"/>
      <stop offset="50%" stop-color="#e08898"/>
      <stop offset="72%" stop-color="#d4788a"/>
      <stop offset="88%" stop-color="#c06075"/>
      <stop offset="100%" stop-color="#7a3540"/>
    </linearGradient>
    <!-- Wine inside (showing through clear glass) -->
    <linearGradient id="wineInside" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a0b0" stop-opacity="0.0"/>
      <stop offset="30%" stop-color="#f0b8c4" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#f0b8c4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#e8a0b0" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Capsule gradient: darker rose/pink -->
    <linearGradient id="capsuleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a1830"/>
      <stop offset="35%" stop-color="#a02848"/>
      <stop offset="65%" stop-color="#8a2040"/>
      <stop offset="100%" stop-color="#6a1830"/>
    </linearGradient>
    <!-- Label gradient -->
    <linearGradient id="labelGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff0f4"/>
    </linearGradient>
    <!-- Cork gradient -->
    <linearGradient id="corkGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b8936a"/>
      <stop offset="50%" stop-color="#d4a96e"/>
      <stop offset="100%" stop-color="#b8936a"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-20%" y="-5%" width="140%" height="115%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9b2d55" flood-opacity="0.3"/>
    </filter>
    <!-- Glass highlight overlay -->
    <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#fff" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Drop shadow ellipse -->
  <ellipse cx="100" cy="456" rx="40" ry="7" fill="#9b2d55" opacity="0.18"/>

  <!-- === BOTTLE SHAPE (Provence style - slightly slimmer) === -->
  <path d="
    M 70,430
    Q 61,430 61,421
    L 61,222
    Q 61,214 64,212
    Q 59,197 59,177
    Q 58,157 69,143
    L 76,116
    L 76,68
    Q 76,62 82,60
    L 82,50
    Q 82,44 88,44
    L 112,44
    Q 118,44 118,50
    L 118,60
    Q 124,62 124,68
    L 124,116
    L 131,143
    Q 142,157 141,177
    Q 141,197 136,212
    Q 139,214 139,222
    L 139,421
    Q 139,430 130,430
    Z
  " fill="url(#bottleGrad)" filter="url(#shadow)"/>

  <!-- Wine inside showing through (rosé color) -->
  <path d="
    M 70,430
    Q 63,430 63,423
    L 63,222
    L 137,222
    L 137,423
    Q 137,430 130,430
    Z
  " fill="url(#wineInside)"/>

  <!-- Glass highlights - left reflection -->
  <rect x="67" y="217" width="8" height="210" rx="4" fill="url(#glassShine)" opacity="0.7"/>
  <!-- Neck left highlight -->
  <rect x="82" y="52" width="6" height="62" rx="3" fill="#fff" opacity="0.18"/>

  <!-- Right edge subtle darkening -->
  <rect x="129" y="217" width="8" height="210" rx="4" fill="#6a1830" opacity="0.12"/>

  <!-- === CAPSULE === -->
  <path d="M 83,44 Q 83,38 88,38 L 112,38 Q 117,38 117,44 L 117,66 Q 114,70 100,70 Q 86,70 83,66 Z" fill="url(#capsuleGrad)"/>
  <!-- Capsule rib lines -->
  <line x1="83" y1="51" x2="117" y2="51" stroke="#fff" stroke-width="0.8" opacity="0.25"/>
  <line x1="83" y1="57" x2="117" y2="57" stroke="#fff" stroke-width="0.8" opacity="0.18"/>
  <line x1="83" y1="63" x2="117" y2="63" stroke="#fff" stroke-width="0.6" opacity="0.12"/>
  <!-- Capsule highlight -->
  <rect x="86" y="40" width="9" height="24" rx="4" fill="#fff" opacity="0.18"/>

  <!-- === CORK === -->
  <rect x="90" y="30" width="20" height="12" rx="3" fill="url(#corkGrad)"/>
  <!-- Cork texture lines -->
  <line x1="92" y1="33" x2="108" y2="33" stroke="#8a6040" stroke-width="0.7" opacity="0.5"/>
  <line x1="92" y1="36" x2="108" y2="36" stroke="#8a6040" stroke-width="0.6" opacity="0.4"/>
  <line x1="92" y1="39" x2="108" y2="39" stroke="#8a6040" stroke-width="0.6" opacity="0.3"/>
  <rect x="91" y="31" width="7" height="4" rx="2" fill="#fff" opacity="0.2"/>

  <!-- === LABEL === -->
  <rect x="64" y="244" width="72" height="116" rx="5" fill="url(#labelGrad)"/>

  <!-- Label outer border (pink-rose) -->
  <rect x="64" y="244" width="72" height="116" rx="5" fill="none" stroke="#E8748A" stroke-width="1.8"/>
  <!-- Label inner border (thin) -->
  <rect x="68" y="248" width="64" height="108" rx="3" fill="none" stroke="#E8748A" stroke-width="0.7" opacity="0.45"/>

  <!-- Top decorative line -->
  <line x1="71" y1="258" x2="129" y2="258" stroke="#E8748A" stroke-width="1.2"/>

  <!-- Top winery bar -->
  <rect x="69" y="261" width="62" height="13" rx="2" fill="#E8748A"/>
  <rect x="75" y="265" width="34" height="3" rx="1" fill="#fff" opacity="0.85"/>
  <rect x="79" y="270" width="26" height="2.5" rx="1" fill="#fff" opacity="0.6"/>

  <!-- Decorative line -->
  <line x1="71" y1="277" x2="129" y2="277" stroke="#E8748A" stroke-width="0.8" opacity="0.5"/>

  <!-- Rose/flower emblem -->
  <circle cx="100" cy="295" r="11" fill="none" stroke="#E8748A" stroke-width="1"/>
  <!-- Petal suggestion -->
  <ellipse cx="100" cy="289" rx="4" ry="5" fill="#E8748A" opacity="0.2"/>
  <ellipse cx="106" cy="293" rx="4" ry="5" fill="#E8748A" opacity="0.2" transform="rotate(60,106,293)"/>
  <ellipse cx="106" cy="299" rx="4" ry="5" fill="#E8748A" opacity="0.2" transform="rotate(120,106,299)"/>
  <ellipse cx="100" cy="301" rx="4" ry="5" fill="#E8748A" opacity="0.2" transform="rotate(180,100,301)"/>
  <ellipse cx="94" cy="299" rx="4" ry="5" fill="#E8748A" opacity="0.2" transform="rotate(240,94,299)"/>
  <ellipse cx="94" cy="293" rx="4" ry="5" fill="#E8748A" opacity="0.2" transform="rotate(300,94,293)"/>
  <circle cx="100" cy="295" r="4" fill="#E8748A" opacity="0.3"/>

  <!-- Wine name text -->
  <rect x="72" y="311" width="56" height="3.5" rx="1" fill="#9B2D55" opacity="0.55"/>
  <rect x="76" y="317" width="48" height="3" rx="1" fill="#9B2D55" opacity="0.4"/>

  <!-- Decorative line -->
  <line x1="71" y1="323" x2="129" y2="323" stroke="#E8748A" stroke-width="0.8" opacity="0.5"/>

  <!-- Vintage year -->
  <rect x="84" y="327" width="32" height="4" rx="1" fill="#E8748A" opacity="0.55"/>

  <!-- Rosé type line -->
  <rect x="79" y="334" width="42" height="3" rx="1" fill="#9B2D55" opacity="0.3"/>

  <!-- Bottom line -->
  <line x1="71" y1="340" x2="129" y2="340" stroke="#E8748A" stroke-width="1.2"/>

  <!-- Bubble at bottom of bottle inside -->
  <ellipse cx="100" cy="424" rx="36" ry="4" fill="#fff" opacity="0.06"/>
</svg>
