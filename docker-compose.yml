version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: vinodb
      POSTGRES_USER: vino
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://vino:${POSTGRES_PASSWORD}@postgres:5432/vinodb
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "19000:19000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: